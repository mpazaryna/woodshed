<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Design App</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <style>
        .page-content {
            padding: 24px;
        }
        .hero-section {
            height: 400px;
            background-color: #3f51b5;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* {{ edit_1 }} */
        .red-text {
            color: red; /* Change font color to red */
        }
        /* {{ edit_2 }} */
    </style>
</head>
<body>
    <div class="mdl-layout mdl-js-layout mdl-layout--fixed-drawer mdl-layout--fixed-header">
        <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout-title">Material Design App</span>
            </div>
        </header>
        <div class="mdl-layout__drawer">
            <span class="mdl-layout-title">Navigation</span>
            <nav class="mdl-navigation">
                <a class="mdl-navigation__link" href="">Link 1</a>
                <a class="mdl-navigation__link" href="">Link 2</a>
                <a class="mdl-navigation__link" href="">Link 3</a>
                <a class="mdl-navigation__link" href="">Link 4</a>
            </nav>
        </div>
        <main class="mdl-layout__content">
            <div class="hero-section">
                <h1 class="mdl-typography--display-3">Welcome to Our App</h1>
            </div>
            <div class="page-content">
                <h2 class="red-text">Content Section</h2>
                <p>This is where your main content would go.</p>
            </div>
        </main>
    </div>
</body>
</html>
